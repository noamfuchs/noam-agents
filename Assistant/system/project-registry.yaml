# Project Registry
# ----------------
# Read on every Telegram bot turn so the bot knows where to dispatch
# project-flavored requests. Edit by hand to add/remove projects.
#
# Fields:
#   name           — project key (used in dispatches)
#   path           — absolute path on the Mac (~ is expanded by the executor)
#   description    — one-line, used in the bot's system prompt for routing decisions
#   route_keywords — substrings that strongly suggest this project (case-insensitive)
#   exec_mode      — "sync" (wait, reply when done — for fast tasks)
#                  | "background" (ack now, ping when done — for slow tasks)
#                  | "ask" (bot proposes which project; user confirms)

projects:
  - name: crm-rea
    path: ~/Documents/code_projacts/REA/crm-rea
    description: Real-estate CRM for Real Estate Academy. Next.js + Supabase, WhatsApp + BoldSign + Calendly integrations. Lead capture, client follow-up, sales pipeline.
    route_keywords: [lead, client, crm, property, contract, whatsapp, calendly, נדל"ן, ליד]
    exec_mode: background

  - name: webinar-signup-bot
    path: ~/Dropbox/CLAUDE CODE
    description: Webinar signup pipeline (registrations, attendance tracking).
    route_keywords: [webinar, signup, registration, וובינר]
    exec_mode: background

  - name: second-brain
    path: ~/MY BRAIN
    description: This vault — memory, people, projects, journal. Default home for capture and recall.
    route_keywords: [remember, capture, note, journal, person, decision, "זכור", "תרשום"]
    exec_mode: sync

  - name: sem2-coach
    path: ~/Dropbox/IDC/SEM 2/MY SEM 2 COACH
    description: IDC second-semester academic coach. Tracks 9 courses, syllabi, deadlines, submissions across economics core / math / stats / R / Gen AI / entrepreneurship. STATUS.md is the live state.
    route_keywords: [idc, reichman, sem 2, semester, assignment, exam, deadline, course, syllabus, "סמסטר", "מטלה", "מבחן", "ריצמן"]
    exec_mode: background

# Defaults applied when a project entry omits a field
defaults:
  exec_mode: sync
  timeout_seconds: 180
